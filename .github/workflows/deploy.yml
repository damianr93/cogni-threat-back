name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Security audit
        run: pnpm audit --audit-level=high

  deploy-prod:
    needs: audit
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, prod]
    steps:
      - name: Deploy to Production
        run: |
          cd /mnt/SSD_1TB/Apps/cogni-threat/cogni-threat
          git fetch origin main
          git reset --hard origin/main
          cd /mnt/SSD_1TB/Apps/cogni-threat
          docker compose -f docker-compose-truenas.yml up -d --build cogni-threat-api

  deploy-staging:
    needs: audit
    if: github.ref == 'refs/heads/develop'
    runs-on: [self-hosted, staging]
    steps:
      - name: Deploy to Staging
        run: |
          cd /home/daniel/dev-repositories/cogni-threat/cogni-threat
          git fetch origin develop
          git reset --hard origin/develop
          cd /home/daniel/dev-repositories/cogni-threat
          sudo docker compose up -d --build cogni-threat-api
